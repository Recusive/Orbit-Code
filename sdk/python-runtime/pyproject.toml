[build-system]
requires = ["hatchling>=1.24.0"]
build-backend = "hatchling.build"

[project]
name = "orbit-code-cli-bin"
version = "0.0.0-dev"
description = "Pinned Orbit Code CLI runtime for the Python SDK"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "OpenAI" }]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
]

[project.urls]
Homepage = "https://github.com/Recursive/Orbit-Code"
Repository = "https://github.com/Recursive/Orbit-Code"
Issues = "https://github.com/Recursive/Orbit-Code/issues"

[tool.hatch.build]
exclude = [
  ".venv/**",
  ".pytest_cache/**",
  "dist/**",
  "build/**",
]

[tool.hatch.build.targets.wheel]
packages = ["src/orbit_code_cli_bin"]
include = ["src/orbit_code_cli_bin/bin/**"]

[tool.hatch.build.targets.wheel.hooks.custom]

[tool.hatch.build.targets.sdist]

[tool.hatch.build.targets.sdist.hooks.custom]
